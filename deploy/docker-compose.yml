services:

  # Go FreeSWITCH bridge — port 8083
  callbot-bridge:
    build:
      context: ../freeswitch-openai-bridge
      dockerfile: Dockerfile
    image: callbot-bridge:latest
    container_name: callbot-bridge
    restart: unless-stopped
    network_mode: host
    volumes:
      - /dev/shm/bridge:/dev/shm/bridge
    environment:
      - FS_HOST=${FS_HOST:-127.0.0.1:8021}
      - FS_PASSWORD=${FS_PASSWORD:-ClueCon}
      - FS_DOMAIN=${FS_DOMAIN:-}
      - RELAY_URL=${RELAY_URL:-ws://localhost:8091}
      - RELAY_API_KEY=${RELAY_API_KEY:-}

  # Next.js web UI + API routes — port 3000
  callbot-agents:
    build:
      context: ../callbot-realtime-agents-main
      dockerfile: Dockerfile
    image: callbot-realtime-agents:latest
    container_name: callbot-agents
    restart: unless-stopped
    network_mode: host
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEXT_PUBLIC_OPENAI_MODEL=${NEXT_PUBLIC_OPENAI_MODEL:-gpt-4o-mini-realtime-preview}
      - BRIDGE_URL=http://localhost:8083
    command: ["npm", "run", "start"]

  # Viettel ASR gRPC → WebSocket proxy — port 8082
  callbot-asr-proxy:
    build:
      context: ../callbot-realtime-agents-main
      dockerfile: Dockerfile
    image: callbot-realtime-agents:latest
    container_name: callbot-asr-proxy
    restart: unless-stopped
    network_mode: host
    environment:
      - ASR_TOKEN=${ASR_TOKEN}
      - ASR_GRPC_URI=${ASR_GRPC_URI:-103.253.20.28:9000}
      - ASR_PROXY_PORT=8086
    command: ["npm", "run", "asr-proxy"]

  # WebSocket relay server — receives audio from Go bridge, calls OpenAI + TTS — port 8091
  callbot-relay:
    build:
      context: ../callbot-realtime-agents-main
      dockerfile: Dockerfile
    image: callbot-realtime-agents:latest
    container_name: callbot-relay
    restart: unless-stopped
    network_mode: host
    environment:
      - DEBUG_LOGS=false
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini-realtime-preview}
      - RELAY_PORT=8091
      - RELAY_API_KEY=${RELAY_API_KEY:-}
      - BASE_URL=http://localhost:3000
      - ASR_PROXY_URL=ws://localhost:8086
      - TTS_WEBSOCKET_URI=${TTS_WEBSOCKET_URI:-ws://103.253.20.27:8767}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-localhost:9092}
      - KAFKA_CALL_HISTORY_TOPIC=${KAFKA_CALL_HISTORY_TOPIC:-call-history}
    command: ["npm", "run", "relay"]
    depends_on:
      - callbot-agents
      - callbot-asr-proxy

  # Kafka single-node cho call history (KRaft mode)
  callbot-kafka:
    image: apache/kafka:latest
    container_name: callbot-kafka
    restart: unless-stopped
    network_mode: host
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - callbot-kafka-data:/var/lib/kafka/data

  # Kafka UI — port 8090
  callbot-kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: callbot-kafka-ui
    restart: unless-stopped
    network_mode: host
    environment:
      - SERVER_PORT=8090
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=localhost:9092
    depends_on:
      - callbot-kafka

volumes:
  callbot-postgres-data:
  callbot-kafka-data:
