services:

  # Go FreeSWITCH bridge — port 8083
  callbot-bridge:
    build:
      context: ../freeswitch-openai-bridge
      dockerfile: Dockerfile
    image: callbot-bridge:latest
    container_name: callbot-bridge
    restart: unless-stopped
    network_mode: host
    volumes:
      - /dev/shm/bridge:/dev/shm/bridge
    environment:
      - FS_HOST=${FS_HOST:-127.0.0.1:8021}
      - FS_PASSWORD=${FS_PASSWORD:-ClueCon}
      - FS_DOMAIN=${FS_DOMAIN:-}
      - RELAY_URL=${RELAY_URL:-ws://localhost:8091}
      - RELAY_API_KEY=${RELAY_API_KEY:-}

  # Next.js web UI + API routes — port 3000
  callbot-agents:
    build:
      context: ../callbot-realtime-agents-main
      dockerfile: Dockerfile
    image: callbot-realtime-agents:latest
    container_name: callbot-agents
    restart: unless-stopped
    network_mode: host
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEXT_PUBLIC_OPENAI_MODEL=${NEXT_PUBLIC_OPENAI_MODEL:-gpt-4o-mini-realtime-preview}
      - BRIDGE_URL=http://localhost:8083
    command: ["npm", "run", "start"]

  # Viettel ASR gRPC → WebSocket proxy — port 8082
  callbot-asr-proxy:
    build:
      context: ../callbot-realtime-agents-main
      dockerfile: Dockerfile
    image: callbot-realtime-agents:latest
    container_name: callbot-asr-proxy
    restart: unless-stopped
    network_mode: host
    environment:
      - ASR_TOKEN=${ASR_TOKEN}
      - ASR_GRPC_URI=${ASR_GRPC_URI:-103.253.20.28:9000}
      - ASR_PROXY_PORT=8086
      - ASR_SILENCE_TIMEOUT=${ASR_SILENCE_TIMEOUT:-10}
      - ASR_SPEECH_TIMEOUT=${ASR_SPEECH_TIMEOUT:-1}
      - ASR_SPEECH_MAX=${ASR_SPEECH_MAX:-30}
    command: ["npm", "run", "asr-proxy"]

  # WebSocket relay server — receives audio from Go bridge, calls OpenAI + TTS — port 8091
  callbot-relay:
    build:
      context: ../callbot-realtime-agents-main
      dockerfile: Dockerfile
    image: callbot-realtime-agents:latest
    container_name: callbot-relay
    restart: unless-stopped
    network_mode: host
    environment:
      - DEBUG_LOGS=false
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini-realtime-preview}
      - RELAY_PORT=8091
      - RELAY_API_KEY=${RELAY_API_KEY:-}
      - BASE_URL=http://localhost:3000
      - ASR_PROXY_URL=ws://localhost:8086
      - TTS_WEBSOCKET_URI=${TTS_WEBSOCKET_URI:-ws://103.253.20.27:8767}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-10.1.9.201:9092}
      - KAFKA_CALL_HISTORY_TOPIC=${KAFKA_CALL_HISTORY_TOPIC:-telecenter-v3-voice-ai-call-history}
      - TTS_TEMPO=${TTS_TEMPO:-}
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED:-false}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL:-http://localhost:3001}
    command: ["npm", "run", "relay"]
    depends_on:
      - callbot-agents
      - callbot-asr-proxy

  # Kafka single-node cho call history (KRaft mode)

  # Langfuse self-hosted observability — UI at http://localhost:3001
  # Enable by setting LANGFUSE_ENABLED=true in .env
  langfuse-db:
    image: postgres:15-alpine
    container_name: langfuse-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=${LANGFUSE_DB_PASSWORD:-langfuse@156}
      - POSTGRES_DB=langfuse
    volumes:
      - ./data/langfuse-db:/var/lib/postgresql/data
    networks:
      - langfuse-net

  langfuse:
    image: langfuse/langfuse:2
    container_name: langfuse
    restart: unless-stopped
    depends_on:
      - langfuse-db
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-langfuse}@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET:-change-me-in-prod}
      - SALT=${LANGFUSE_SALT:-change-me-in-prod}
      - NEXTAUTH_URL=${LANGFUSE_BASE_URL:-http://localhost:3001}
      - TELEMETRY_ENABLED=false
    networks:
      - langfuse-net

networks:
  langfuse-net:

volumes:
  callbot-postgres-data:
  callbot-kafka-data:
